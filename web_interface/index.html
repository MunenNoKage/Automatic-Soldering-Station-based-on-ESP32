<!DOCTYPE html>
<!--
  @file index.html
  @brief Main web interface for automatic soldering station
  
  Provides UI for G-Code upload, visualization, manual control,
  and real-time status monitoring of soldering operations.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic Soldering Station</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Automatic Soldering Station</h1>
    </header>

    <main>
        <section id="gcode-section">
            <h2>Drill file Upload</h2>
            <div class="upload-container">
                <input type="file" id="drill-file-input" accept=".DRL" />
                <label for="drill-file-input" class="file-label">Choose .DRL file</label>
                <span id="file-name" class="file-name"></span>
                <button id="upload-btn" class="btn-upload" disabled="true">Parse</button>
            </div>
            <div id="upload-status" class="upload-status"></div>
        </section>

        <section id="preview-section" style="display: none;">
            <h2>File Preview</h2>
            <div class="preview-container">
                <div class="preview-pane">
                    <h3>Drill File Content</h3>
                    <pre id="drill-content"></pre>
                </div>
                <div class="preview-pane">
                    <h3>Generated G-Code</h3>
                    <pre id="gcode-content"></pre>
                </div>
            </div>
            <div class="action-buttons">
                <button id="send-btn" class="btn-send">Upload to Controller</button>
                <button id="cancel-btn" class="btn-cancel">Cancel</button>
            </div>
            <div id="send-status" class="upload-status"></div>
        </section>

        <section id="navigation-section">
            <div class="nav-buttons">
                <button id="btn-manual" class="btn-nav">Manual Control</button>
            </div>
        </section>
    </main>

    <footer>
    </footer>

    <script src="app.js"></script>
</body>
</html>
