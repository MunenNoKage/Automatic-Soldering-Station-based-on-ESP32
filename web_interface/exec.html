<!DOCTYPE html>
<!--
  @file exec.html
  @brief Execution control page for automatic soldering station
  
  Provides UI for controlling G-Code execution (start, pause, resume, stop).
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execution Control - Automatic Soldering Station</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Automatic Soldering Station</h1>
    </header>

    <main>
        <section id="visualization-section">
            <h2>Position</h2>
            <div class="canvas-wrapper">
                <canvas id="board-canvas" width="800" height="600"></canvas>
            </div>
            <div class="visualization-info">
                <span id="current-position">Position: X=0.0, Y=0.0, Z=0.0 mm</span>
                <span id="board-dimensions">Board: 0×0 mm</span>
            </div>
        </section>

        <section id="control-section">
            <h2>Execution Control</h2>
            <div class="control-buttons">
                <button id="start-btn" class="btn-control btn-start">Start</button>
                <button id="pause-btn" class="btn-control btn-pause" disabled>Pause</button>
                <button id="resume-btn" class="btn-control btn-resume" disabled>Resume</button>
                <button id="stop-btn" class="btn-control btn-stop" disabled>Stop</button>
            </div>
            <div id="control-status" class="upload-status"></div>
        </section>
    </main>

    <footer>
    </footer>

    <script src="board_visualization.js"></script>
    <script src="board_canvas.js"></script>
    <script src="exec.js"></script>
</body>
</html>
