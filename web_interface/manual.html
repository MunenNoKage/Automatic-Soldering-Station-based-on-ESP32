<!DOCTYPE html>
<!--
  @file manual.html
  @brief Manual control page for automatic soldering station

  Provides UI for manual positioning and control of the soldering station.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Control - Automatic Soldering Station</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Automatic Soldering Station</h1>
    </header>

    <main>
        <section id="visualization-section">
            <h2>Position</h2>
            <div class="canvas-wrapper">
                <canvas id="board-canvas" width="800" height="600"></canvas>
            </div>
            <div class="coord-inputs">
                <div class="input-group">
                    <label for="manual-x">X (mm):</label>
                    <input type="number" id="manual-x" step="1" value="0" />
                </div>
                <div class="input-group">
                    <label for="manual-y">Y (mm):</label>
                    <input type="number" id="manual-y" step="1" value="0" />
                </div>
                <div class="input-group">
                    <label for="manual-z">Z (mm):</label>
                    <input type="number" id="manual-z" step="1" value="0" />
                </div>
            </div>
            <p style="color: gray; font-size: 0.9rem;">Set the desired position of the soldering iron's tip by choosing a point on the board above or entering the precise coordinates in the input fields.</p>
        </section>
        <section id="manual-control-section">
            <h2>Station control</h2>
            <div class="manual-controls">
                <div class="manual-buttons">
                    <button id="manual-enter-btn" class="btn-manual btn-start">Calibrate</button>
                    <button id="manual-move-btn" class="btn-manual btn-resume" disabled>Move to Position</button>
                    <button id="manual-set-origin-btn" class="btn-manual btn-pause" disabled>Set Origin Here</button>
                </div>
            </div>
            <div class="solder-controls">
                <div class="input-group" style="flex-direction: row; margin-top: 1rem;">
                    <input type="number" id="solder-amount" step="10" value="0" min="-1000" max="1000" />
                    <button id="solder-feed-btn" class="btn-manual btn-solder" disabled>Feed Solder</button>
                </div>
            </div>
            <div id="manual-status" class="upload-status"></div>
        </section>
    </main>

    <footer>
    </footer>

    <script src="board_visualization.js"></script>
    <script src="machine_canvas.js"></script>
    <script src="manual.js"></script>
</body>
</html>
